<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body { margin: 0; padding: 16px; font-family: sans-serif; background: transparent; }
</style>
</head>
<body>
<svg width="100%" viewBox="0 0 680 550" role="img">
<title>Transformer architecture</title>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#1a7a5e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text font-size="15" font-weight="600" x="165" y="24" text-anchor="middle" fill="#111">Encoder</text>
<text font-size="15" font-weight="600" x="510" y="24" text-anchor="middle" fill="#111">Decoder</text>

<!-- Inputs -->
<rect x="55" y="32" width="220" height="44" rx="8" fill="#E8E8E8" stroke="#999" stroke-width="0.8"/>
<text font-size="13" font-weight="600" x="165" y="50" text-anchor="middle" dominant-baseline="central" fill="#111">Arabic input</text>
<text font-size="11" x="165" y="68" text-anchor="middle" dominant-baseline="central" fill="#222">token IDs — shape (B, S)</text>

<rect x="400" y="32" width="220" height="44" rx="8" fill="#E8E8E8" stroke="#999" stroke-width="0.8"/>
<text font-size="13" font-weight="600" x="510" y="50" text-anchor="middle" dominant-baseline="central" fill="#111">English input (shifted)</text>
<text font-size="11" x="510" y="68" text-anchor="middle" dominant-baseline="central" fill="#222">token IDs — shape (B, T)</text>

<line x1="165" y1="76" x2="165" y2="100" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="510" y1="76" x2="510" y2="100" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Embeddings -->
<rect x="55" y="104" width="220" height="44" rx="8" fill="#A8DCC8" stroke="#1a7a5e" stroke-width="0.8"/>
<text font-size="13" font-weight="600" x="165" y="122" text-anchor="middle" dominant-baseline="central" fill="#111">Embedding + pos encoding</text>
<text font-size="11" x="165" y="140" text-anchor="middle" dominant-baseline="central" fill="#0a2a20">d_model=256 · scaled ×√256</text>

<rect x="400" y="104" width="220" height="44" rx="8" fill="#F5B49A" stroke="#b04420" stroke-width="0.8"/>
<text font-size="13" font-weight="600" x="510" y="122" text-anchor="middle" dominant-baseline="central" fill="#111">Embedding + pos encoding</text>
<text font-size="11" x="510" y="140" text-anchor="middle" dominant-baseline="central" fill="#2a0e02">d_model=256 · scaled ×√256</text>

<line x1="165" y1="148" x2="165" y2="174" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="510" y1="148" x2="510" y2="174" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Encoder stack -->
<rect x="48" y="178" width="234" height="140" rx="12" fill="none" stroke="#1a7a5e" stroke-width="1" stroke-dasharray="6 4"/>
<text font-size="11" font-weight="600" x="62" y="196" dominant-baseline="central" fill="#1a7a5e">Encoder ×3 layers</text>

<rect x="62" y="202" width="206" height="44" rx="8" fill="#A8DCC8" stroke="#1a7a5e" stroke-width="0.8"/>
<text font-size="13" font-weight="600" x="165" y="220" text-anchor="middle" dominant-baseline="central" fill="#111">Multi-head self-attn</text>
<text font-size="11" x="165" y="238" text-anchor="middle" dominant-baseline="central" fill="#0a2a20">src padding mask · 8 heads</text>

<rect x="62" y="262" width="206" height="44" rx="8" fill="#A8DCC8" stroke="#1a7a5e" stroke-width="0.8"/>
<text font-size="13" font-weight="600" x="165" y="280" text-anchor="middle" dominant-baseline="central" fill="#111">Feed-forward network</text>
<text font-size="11" x="165" y="298" text-anchor="middle" dominant-baseline="central" fill="#0a2a20">d_ff=512 · ReLU · add&amp;norm</text>

<!-- Decoder stack -->
<rect x="393" y="178" width="234" height="202" rx="12" fill="none" stroke="#b04420" stroke-width="1" stroke-dasharray="6 4"/>
<text font-size="11" font-weight="600" x="407" y="196" dominant-baseline="central" fill="#b04420">Decoder ×3 layers</text>

<rect x="407" y="202" width="206" height="44" rx="8" fill="#F5B49A" stroke="#b04420" stroke-width="0.8"/>
<text font-size="13" font-weight="600" x="510" y="220" text-anchor="middle" dominant-baseline="central" fill="#111">Masked self-attention</text>
<text font-size="11" x="510" y="238" text-anchor="middle" dominant-baseline="central" fill="#2a0e02">look-ahead mask · 8 heads</text>

<rect x="407" y="262" width="206" height="44" rx="8" fill="#F5B49A" stroke="#b04420" stroke-width="0.8"/>
<text font-size="13" font-weight="600" x="510" y="280" text-anchor="middle" dominant-baseline="central" fill="#111">Cross-attention</text>
<text font-size="11" x="510" y="298" text-anchor="middle" dominant-baseline="central" fill="#2a0e02">Q ← decoder · K,V ← encoder</text>

<rect x="407" y="322" width="206" height="44" rx="8" fill="#F5B49A" stroke="#b04420" stroke-width="0.8"/>
<text font-size="13" font-weight="600" x="510" y="340" text-anchor="middle" dominant-baseline="central" fill="#111">Feed-forward network</text>
<text font-size="11" x="510" y="358" text-anchor="middle" dominant-baseline="central" fill="#2a0e02">d_ff=512 · ReLU · add&amp;norm</text>

<!-- K,V cross-attention arrow -->
<text font-size="12" font-weight="700" x="340" y="272" text-anchor="middle" fill="#1a7a5e">K, V</text>
<path d="M282,284 L405,284" fill="none" stroke="#1a7a5e" stroke-width="2" marker-end="url(#arrow-green)"/>

<line x1="510" y1="380" x2="510" y2="408" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Linear -->
<rect x="400" y="412" width="220" height="44" rx="8" fill="#C8C2F0" stroke="#4a40b0" stroke-width="0.8"/>
<text font-size="13" font-weight="600" x="510" y="430" text-anchor="middle" dominant-baseline="central" fill="#111">Linear + softmax</text>
<text font-size="11" x="510" y="448" text-anchor="middle" dominant-baseline="central" fill="#110d40">logits → (B, T, 8000)</text>

<line x1="510" y1="456" x2="510" y2="480" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Output -->
<rect x="400" y="484" width="220" height="44" rx="8" fill="#E8E8E8" stroke="#999" stroke-width="0.8"/>
<text font-size="13" font-weight="600" x="510" y="502" text-anchor="middle" dominant-baseline="central" fill="#111">English translation</text>
<text font-size="11" x="510" y="520" text-anchor="middle" dominant-baseline="central" fill="#222">token by token · greedy decode</text>
</svg>
</body>
</html>
