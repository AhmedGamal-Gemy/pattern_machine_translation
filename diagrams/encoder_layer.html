<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>body{margin:0;padding:16px;font-family:sans-serif;background:transparent;}</style>
</head><body>
<svg width="100%" viewBox="0 0 680 420" role="img">
<title>Encoder layer internals</title>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-res" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#4a40b0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text font-size="15" font-weight="600" x="340" y="24" text-anchor="middle" fill="#111">Encoder layer — one of 3 repeated blocks</text>

<!-- Input -->
<rect x="240" y="38" width="200" height="40" rx="8" fill="#E8E8E8" stroke="#999" stroke-width="0.8"/>
<text font-size="13" font-weight="600" x="340" y="58" text-anchor="middle" dominant-baseline="central" fill="#111">Input x</text>
<text font-size="11" x="340" y="72" text-anchor="middle" dominant-baseline="central" fill="#333">shape (B, S, 256)</text>

<!-- residual branch 1 — fork -->
<line x1="340" y1="78" x2="340" y2="102" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- residual line going right -->
<path d="M 440 98 L 540 98 L 540 198" fill="none" stroke="#4a40b0" stroke-width="1.5" stroke-dasharray="5 3"/>
<text font-size="11" font-weight="600" x="542" y="148" fill="#4a40b0">residual</text>

<!-- Self attention -->
<rect x="220" y="106" width="240" height="50" rx="8" fill="#A8DCC8" stroke="#1a7a5e" stroke-width="0.8"/>
<text font-size="13" font-weight="600" x="340" y="126" text-anchor="middle" dominant-baseline="central" fill="#111">Multi-head self-attention</text>
<text font-size="11" x="340" y="146" text-anchor="middle" dominant-baseline="central" fill="#0a2a20">8 heads × 32 dims — src padding mask</text>

<line x1="340" y1="156" x2="340" y2="180" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Add & Norm 1 -->
<rect x="240" y="184" width="200" height="40" rx="8" fill="#C8C2F0" stroke="#4a40b0" stroke-width="0.8"/>
<text font-size="13" font-weight="600" x="340" y="204" text-anchor="middle" dominant-baseline="central" fill="#111">Add &amp; LayerNorm</text>

<!-- residual branch 1 — join -->
<path d="M 540 198 L 540 204 L 442 204" fill="none" stroke="#4a40b0" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-res)"/>

<line x1="340" y1="224" x2="340" y2="248" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- residual branch 2 — fork -->
<path d="M 440 244 L 590 244 L 590 344" fill="none" stroke="#b04420" stroke-width="1.5" stroke-dasharray="5 3"/>
<text font-size="11" font-weight="600" x="592" y="294" fill="#b04420">residual</text>

<!-- FFN -->
<rect x="220" y="252" width="240" height="50" rx="8" fill="#A8DCC8" stroke="#1a7a5e" stroke-width="0.8"/>
<text font-size="13" font-weight="600" x="340" y="272" text-anchor="middle" dominant-baseline="central" fill="#111">Feed-forward network</text>
<text font-size="11" x="340" y="292" text-anchor="middle" dominant-baseline="central" fill="#0a2a20">Linear(256→512) → ReLU → Linear(512→256)</text>

<line x1="340" y1="302" x2="340" y2="326" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Add & Norm 2 -->
<rect x="240" y="330" width="200" height="40" rx="8" fill="#C8C2F0" stroke="#4a40b0" stroke-width="0.8"/>
<text font-size="13" font-weight="600" x="340" y="350" text-anchor="middle" dominant-baseline="central" fill="#111">Add &amp; LayerNorm</text>

<!-- residual branch 2 — join -->
<path d="M 590 344 L 590 350 L 442 350" fill="none" stroke="#b04420" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-res)"/>

<line x1="340" y1="370" x2="340" y2="394" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Output -->
<rect x="240" y="394" width="200" height="14" rx="4" fill="none"/>
<text font-size="13" font-weight="600" x="340" y="404" text-anchor="middle" fill="#111">Output — same shape (B, S, 256)</text>

<!-- Note -->
<text font-size="11" x="340" y="416" text-anchor="middle" fill="#555">Every residual adds the block's INPUT directly to its OUTPUT before normalizing</text>
</svg>
</body></html>
