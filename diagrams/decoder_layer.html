<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>body{margin:0;padding:16px;font-family:sans-serif;background:transparent;}</style>
</head><body>
<svg width="100%" viewBox="0 0 680 560" role="img">
<title>Decoder layer internals</title>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-res" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#4a40b0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-enc" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#1a7a5e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text font-size="15" font-weight="600" x="340" y="24" text-anchor="middle" fill="#111">Decoder layer — one of 3 repeated blocks</text>

<!-- Input -->
<rect x="230" y="38" width="220" height="40" rx="8" fill="#E8E8E8" stroke="#999" stroke-width="0.8"/>
<text font-size="13" font-weight="600" x="340" y="58" text-anchor="middle" dominant-baseline="central" fill="#111">Input x (English so far)</text>
<text font-size="11" x="340" y="72" text-anchor="middle" dominant-baseline="central" fill="#333">shape (B, T, 256)</text>

<line x1="340" y1="78" x2="340" y2="102" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M 452 98 L 590 98 L 590 208" fill="none" stroke="#4a40b0" stroke-width="1.5" stroke-dasharray="5 3"/>
<text font-size="11" font-weight="600" x="594" y="153" fill="#4a40b0">res</text>

<!-- Masked self-attention -->
<rect x="210" y="106" width="260" height="50" rx="8" fill="#F5B49A" stroke="#b04420" stroke-width="0.8"/>
<text font-size="13" font-weight="600" x="340" y="126" text-anchor="middle" dominant-baseline="central" fill="#111">Masked self-attention</text>
<text font-size="11" x="340" y="146" text-anchor="middle" dominant-baseline="central" fill="#2a0e02">look-ahead mask — can't see future tokens</text>

<line x1="340" y1="156" x2="340" y2="180" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Add & Norm 1 -->
<rect x="240" y="184" width="200" height="40" rx="8" fill="#C8C2F0" stroke="#4a40b0" stroke-width="0.8"/>
<text font-size="13" font-weight="600" x="340" y="204" text-anchor="middle" dominant-baseline="central" fill="#111">Add &amp; LayerNorm</text>
<path d="M 590 208 L 590 204 L 442 204" fill="none" stroke="#4a40b0" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-res)"/>

<line x1="340" y1="224" x2="340" y2="248" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M 452 244 L 610 244 L 610 364" fill="none" stroke="#b04420" stroke-width="1.5" stroke-dasharray="5 3"/>
<text font-size="11" font-weight="600" x="614" y="304" fill="#b04420">res</text>

<!-- Encoder output injection -->
<rect x="30" y="280" width="160" height="40" rx="8" fill="#A8DCC8" stroke="#1a7a5e" stroke-width="0.8"/>
<text font-size="12" font-weight="600" x="110" y="295" text-anchor="middle" dominant-baseline="central" fill="#111">Encoder output</text>
<text font-size="11" x="110" y="311" text-anchor="middle" dominant-baseline="central" fill="#0a2a20">(B, S, 256)</text>
<text font-size="11" font-weight="600" x="184" y="298" fill="#1a7a5e">K, V →</text>
<line x1="194" y1="300" x2="208" y2="300" stroke="#1a7a5e" stroke-width="1.5" marker-end="url(#arrow-enc)"/>

<!-- Cross-attention -->
<rect x="210" y="252" width="260" height="50" rx="8" fill="#F5B49A" stroke="#b04420" stroke-width="0.8"/>
<text font-size="13" font-weight="600" x="340" y="272" text-anchor="middle" dominant-baseline="central" fill="#111">Cross-attention</text>
<text font-size="11" x="340" y="292" text-anchor="middle" dominant-baseline="central" fill="#2a0e02">Q ← decoder · K,V ← encoder output</text>

<line x1="340" y1="302" x2="340" y2="326" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Add & Norm 2 -->
<rect x="240" y="330" width="200" height="40" rx="8" fill="#C8C2F0" stroke="#4a40b0" stroke-width="0.8"/>
<text font-size="13" font-weight="600" x="340" y="350" text-anchor="middle" dominant-baseline="central" fill="#111">Add &amp; LayerNorm</text>
<path d="M 610 364 L 610 350 L 442 350" fill="none" stroke="#b04420" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-res)"/>

<line x1="340" y1="370" x2="340" y2="394" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M 452 390 L 630 390 L 630 500" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="5 3"/>
<text font-size="11" font-weight="600" x="634" y="445" fill="#888">res</text>

<!-- FFN -->
<rect x="210" y="398" width="260" height="50" rx="8" fill="#F5B49A" stroke="#b04420" stroke-width="0.8"/>
<text font-size="13" font-weight="600" x="340" y="418" text-anchor="middle" dominant-baseline="central" fill="#111">Feed-forward network</text>
<text font-size="11" x="340" y="438" text-anchor="middle" dominant-baseline="central" fill="#2a0e02">Linear(256→512) → ReLU → Linear(512→256)</text>

<line x1="340" y1="448" x2="340" y2="472" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Add & Norm 3 -->
<rect x="240" y="476" width="200" height="40" rx="8" fill="#C8C2F0" stroke="#4a40b0" stroke-width="0.8"/>
<text font-size="13" font-weight="600" x="340" y="496" text-anchor="middle" dominant-baseline="central" fill="#111">Add &amp; LayerNorm</text>
<path d="M 630 500 L 630 496 L 442 496" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-res)"/>

<text font-size="13" font-weight="600" x="340" y="534" text-anchor="middle" fill="#111">Output — shape (B, T, 256)</text>
<text font-size="11" x="340" y="550" text-anchor="middle" fill="#555">3 sub-layers per block vs encoder's 2 — the extra one is cross-attention</text>
</svg>
</body></html>
