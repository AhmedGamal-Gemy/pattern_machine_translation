<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body { margin: 0; padding: 16px; font-family: sans-serif; background: transparent; }
</style>
</head>
<body>
<svg width="100%" viewBox="0 0 680 370" role="img">
<title>Scaled dot-product attention</title>
<desc>The decoder generating the English word I attends mostly to the Arabic token ana</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Section label -->
<text font-size="12" font-weight="600" x="340" y="22" text-anchor="middle" fill="#333">encoder output tokens — Keys (K) and Values (V)</text>

<!-- Weights above tokens -->
<text font-size="13" font-weight="700" x="152" y="48" text-anchor="middle" fill="#7a4a00">0.72</text>
<text font-size="12" x="252" y="48" text-anchor="middle" fill="#555">0.18</text>
<text font-size="12" x="340" y="48" text-anchor="middle" fill="#555">0.05</text>
<text font-size="12" x="428" y="48" text-anchor="middle" fill="#555">0.03</text>
<text font-size="12" x="528" y="48" text-anchor="middle" fill="#555">0.02</text>

<!-- Encoder tokens -->
<rect x="110" y="56" width="84" height="40" rx="8" fill="#FAD88A" stroke="#9a6000" stroke-width="1.2"/>
<text font-size="14" font-weight="700" x="152" y="76" text-anchor="middle" dominant-baseline="central" fill="#111">ana</text>

<rect x="210" y="56" width="84" height="40" rx="8" fill="#E8E8E8" stroke="#999" stroke-width="0.8"/>
<text font-size="13" font-weight="600" x="252" y="76" text-anchor="middle" dominant-baseline="central" fill="#111">talib</text>

<rect x="298" y="56" width="84" height="40" rx="8" fill="#E8E8E8" stroke="#999" stroke-width="0.8"/>
<text font-size="13" font-weight="600" x="340" y="76" text-anchor="middle" dominant-baseline="central" fill="#111">fi</text>

<rect x="386" y="56" width="84" height="40" rx="8" fill="#E8E8E8" stroke="#999" stroke-width="0.8"/>
<text font-size="13" font-weight="600" x="428" y="76" text-anchor="middle" dominant-baseline="central" fill="#111">jami3a</text>

<rect x="486" y="56" width="84" height="40" rx="8" fill="#E8E8E8" stroke="#999" stroke-width="0.8"/>
<text font-size="13" font-weight="600" x="528" y="76" text-anchor="middle" dominant-baseline="central" fill="#111">[EOS]</text>

<!-- Attention lines -->
<line x1="152" y1="96" x2="340" y2="240" stroke="#D4900A" stroke-width="6" opacity="1.0"/>
<line x1="252" y1="96" x2="340" y2="240" stroke="#888" stroke-width="3" opacity="0.7"/>
<line x1="340" y1="96" x2="340" y2="240" stroke="#888" stroke-width="1.8" opacity="0.5"/>
<line x1="428" y1="96" x2="340" y2="240" stroke="#888" stroke-width="1.2" opacity="0.35"/>
<line x1="528" y1="96" x2="340" y2="240" stroke="#888" stroke-width="0.8" opacity="0.2"/>

<!-- Legend -->
<text font-size="11" font-weight="600" x="44" y="158" text-anchor="middle" fill="#444">line</text>
<text font-size="11" font-weight="600" x="44" y="172" text-anchor="middle" fill="#444">width</text>
<text font-size="11" font-weight="600" x="44" y="186" text-anchor="middle" fill="#444">=</text>
<text font-size="11" font-weight="600" x="44" y="200" text-anchor="middle" fill="#444">weight</text>

<!-- Decoder token -->
<rect x="298" y="240" width="84" height="40" rx="8" fill="#FAD88A" stroke="#9a6000" stroke-width="1.5"/>
<text font-size="14" font-weight="700" x="340" y="260" text-anchor="middle" dominant-baseline="central" fill="#111">I</text>

<!-- Decoder label -->
<text font-size="12" font-weight="600" x="340" y="302" text-anchor="middle" fill="#333">decoder query (Q) — currently generating: "I"</text>

<!-- Formula -->
<text font-size="13" font-weight="600" x="340" y="332" text-anchor="middle" fill="#111">attention(Q, K, V) = softmax( QKᵀ / √32 ) · V</text>

<!-- Caption -->
<text font-size="11" x="340" y="358" text-anchor="middle" fill="#444">"ana talib fi jami3a" → "I am a student at university"</text>
</svg>
</body>
</html>
